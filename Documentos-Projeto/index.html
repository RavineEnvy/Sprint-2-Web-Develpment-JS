<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1 id="h1">FilmaAI</h1>
        <h2 id="sub-titulo">A Leitura que fala por Você!</h2>
        <nav>
            <button id="btn-login" type="button">Login</button>
            <button id="btn-cadastro" type="button">Cadastre-se</button>
        </nav>
    </header>
    <main>
        <section id="form-login">
            <input type="text" id="usuario" placeholder="Usuário">
            <input type="password" id="senha" placeholder="Senha">

            <button id="btn-confirmar" type="button">Confirmar</button>
        </section>
        <section id="form-cadastro">
            <input type="text" id="AddUsuario" placeholder="Defina um usuário">
            <input type="password" id="AddSenha" placeholder="Defina uma Senha">
            <input type="password" id="Addsenha-2" placeholder="Repita a Senha">
            <button id="btn-confirmar-Cadastro" type="button">Confirmar Cadastro</button>
        </section>

    </main>
    <script src="JavaScript/app.js"></script>
</body>
</html>
