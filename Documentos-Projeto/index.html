<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1 id="h1">FILMA <span>AI</span></h1>
        <h2 id="sub-titulo">A Leitura que fala por Você!</h2>
        <nav class="nav-btn">
            <button id="btn-login" class="btn"  type="button">Login</button>
            <button id="btn-cadastro" class="btn" type="button">Cadastre-se</button>
        </nav>
    </header>
    <main>
        <section id="form-login">
            <input type="text" id="usuario" placeholder="Usuário">
            <input type="password" id="senha" placeholder="Senha">

            <button id="btn-confirmar" type="button">Confirmar</button>
        </section>
        <section id="form-cadastro">
            <input type="text" id="addUsuario" placeholder="Defina um usuário">
            <input type="password" id="addSenha" placeholder="Defina uma Senha">
            <button id="btn-confirmar-Cadastro" type="button">Confirmar Cadastro</button>
        </section>
        <div>
            <p id="paragrafo"></p>
        </div>
        <div class="slider">
            <div class="slides">
                <img  class="slide" src="public/logo filmaAI.png" alt="logo">
                <img  class="slide" src="public/Inicial.png" alt="camera">
                <img  class="slide" src="public/Documento_-_Opcoes.png" alt="#">
                <img  class="slide" src="public/Edicao_Documento_TXT.png" alt="#">
                <img  class="slide" src="public/Galeria_de_Arquivos_-_Icones_Pequenos.png" alt="#">
            </div>
            <button id="btn-slide-prev" class="prev" onclick="prevSlide()">&#10094</button>
            <button id="btn-slide-next" class="next" onclick="nextSlide()">&#10095</button>
        </div>
    </main>
    <script src="JavaScript/app.js"></script>
</body>
</html>
